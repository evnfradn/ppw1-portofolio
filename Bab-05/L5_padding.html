<html>
<head>
    <title>Contoh CSS</title>
    <style>
        .padding-all {
            border: 1px solid rgb(238, 222, 130);
            padding: 10px 5px 2px 20px;
        }

        .padding-each {
            border: 1px solid rgb(247, 25, 128);
            padding-top: 5px;
            padding-right: 10px;
            padding-bottom: 15px;
            padding-left: 25px;
        }
    </style>
</head>
<body>
    <p class="padding-all">Aku adalah tag p dengan padding-all </p>
    <p class="padding-each">Aku adalah tag p dengan padding-each </p>
</body>
</html>
