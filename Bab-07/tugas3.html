<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tugas 3 | CSS Animation & Transition</title>
  <style>
    :root {
      --bg-color: #0f1117;
      --card-bg: #252839;
      --primary: #6c63ff;
      --secondary: #a78bfa;
      --text: #ffffff;
      --white: #ffffff;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .container {
      animation: fadeIn 1.5s ease-out forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 50px;
    }

    header h1 {
      color: var(--secondary);
      border-bottom: 2px solid var(--primary);
      padding-bottom: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .spinner-section {
      text-align: center;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid rgba(167, 139, 250, 0.2);
      border-top: 6px solid var(--secondary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    .button-section {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 15px 30px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: var(--white);
      transition: 0.4s ease;
    }

    .btn-color {
      background-color: var(--primary);
      transition: background-color 0.4s;
    }
    .btn-color:hover {
      background-color: #ff4757; 
    }

    .btn-transform {
      background-color: var(--secondary);
      transition: transform 0.3s;
    }
    .btn-transform:hover {
      transform: scale(1.15) rotate(5deg);
    }

    .btn-shadow {
      background-color: transparent;
      border: 2px solid var(--secondary);
      transition: box-shadow 0.3s, background-color 0.3s;
    }
    .btn-shadow:hover {
      background-color: var(--secondary);
      box-shadow: 0 0 20px var(--secondary);
    }

    footer {
      margin-top: 50px;
      opacity: 0.6;
      font-size: 14px;
    }

    .card-section {
      perspective: 1000px;
      text-align: center;
    }

    .rotating-card {
      width: 250px;
      height: 150px;
      cursor: pointer;
      margin: 20px auto;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.8s;
      transform-style: preserve-3d;
    }

    .rotating-card:hover .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--secondary);
    }

    .card-front {
      background-color: var(--card-bg);
      color: white;
    }

    .card-back {
      background-color: var(--primary);
      color: white;
      transform: rotateY(180deg);
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Interactive Components</h1>
    </header>

    <div class="spinner-section">
      <p>Loading Content...</p>
      <div class="spinner"></div>
    </div>

    <div class="button-section">
      <button class="btn btn-color">Color Change</button>
      <button class="btn btn-transform">Scaling Up</button>
      <button class="btn btn-shadow">Neon Glow</button>
    </div>

    <div class="card-section">
      <p style="font-size: 14px; color: var(--secondary);">Tugas Bonus</p>
      <div class="rotating-card">
        <div class="card-inner">
          <div class="card-front">
            <h3>Pencet aku</h3>
            <p>3D Rotation Effect</p>
          </div>
          <div class="card-back">
            <h3>Nice!</h3>
            <p>Rotating 180°</p>
          </div>
        </div>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 Evan Design - Tugas 3 PPW</p>
    </footer>
  </div>

</body>
</html>
