<!DOCTYPE html>
<html>

<body>
    <h2>Atribut formmethod evan ganteng</h2>
    <form action="/kirim" method="get">
        <label for="nama">Nama:</label><br>
        <input type="text" id="nama" name="nama" value="evan ganteng"><br><br>
        <button type="submit">Kirim GET biasa</button>
        <button type="submit" formmethod="post">Kirim POST untuk evan ganteng</button>
    </form>
</body>

</html>
