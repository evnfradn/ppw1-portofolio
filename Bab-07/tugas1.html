<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Tugas 1 | CSS Position </title>
  <style>
    body {
      background-color: #0f1117;
      height: 2000px;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    nav {
      position: sticky;
      top: 0;
      background-color: #1a1d2b;
      color: white;
      padding: 15px;
      text-align: center;
      z-index: 1000;
    }
    .container{
      display: flex;
      justify-content: center;
      padding-top: 50px;
    }
    .profile-card{

      background: #252839;
      position: relative;
      width: 280px;
      height:350px;
      align-items: center;
      justify-content: center;
      border-radius: 15px;
      display: flex;
      color: white;
      font-size: 24px;
      font-weight: bold;
      border-color: #a78bfa;
      border-width: 1px;
      border-style: solid;
      flex-direction: column;
    }
      @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
    .status{
    position: absolute;
    top: 15px;
    right: 15px;
    background: linear-gradient(135deg, #6c63ff, #a78bfa);
    color: white;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
    }
    .img-profile{
      margin-top: 50px;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      overflow: hidden;
    }
    .img-profile img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: spin 4s linear infinite;
    }
    .profile-card h3{
      position: absolute;
      bottom: 20px;
      left: 20px;
    }
    .text-profile{
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
    }
    
    .back-to-top{
      position: fixed;
      bottom: 30px;
      right: 30px;
      background-color: #6c63ff;
      color: white;
      padding: 12px 18px;
      border-radius: 50px;
      font-size: 14px;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      z-index: 1000;
    }
    </style>
</head>

<body>
  <nav> Evan Fausta Pradana's Card</nav>
  <div class="container">
    <div class="profile-card">
      <div class="status"><p> Online 🟢</p></div>
      <div class="img-profile">
        <img src="https://i.pinimg.com/736x/0b/9c/23/0b9c232a89d7379dd9fbe6b2f654e603.jpg" alt="EVAN">
      </div>
      <div class="text-profile">
        <p> Evan Fausta P <br> PL2B1 | 560829 </p>
      </div>

    </div>
  </div>
  <a href="#" class="back-to-top">
    <p> Back to home </p>
  </a>
</body>

</html>
