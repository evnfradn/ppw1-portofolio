<!DOCTYPE html>
<html>

<body>
    <h2>Atribut action evan ganteng</h2>
    <p>Target beda-beda untuk evan ganteng:</p>
    <form action="/blank" target="_blank"><button type="submit">_blank</button></form><br>
    <form action="/self" target="_self"><button type="submit">_self</button></form><br>
    <form action="/parent" target="_parent"><button type="submit">_parent</button></form><br>
    <form action="/top" target="_top"><button type="submit">_top</button></form><br>
    <form action="/frame" target="framename"><button type="submit">framename</button></form>
</body>

</html>
