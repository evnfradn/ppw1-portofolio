<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pendaftaran</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background-color: #f7f8fa;
            font-family: 'Poppins', sans-serif;
            color: #333;
        }

        .side-banner {
            background-image: url("https://i.pinimg.com/originals/46/00/b0/4600b07b597a4501015dce458cc3aa54.gif");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.35rem;
            color: #1f2937;
        }

        .asterisk {
            color: #e11d48;
        }

        .form-control,
        .form-select {
            font-size: 0.9rem;
            padding: 0.6rem 0.8rem;
            border-color: #e5e7eb;
            border-radius: 6px;
        }

        .form-control:focus,
        .form-select:focus {
            box-shadow: 0 0 0 0.2rem rgba(11, 99, 246, 0.15);
            border-color: #93c5fd;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .btn-submit {
            background-color: #2592ff;
            color: white;
            padding: 0.6rem 0;
            border-radius: 6px;
            font-weight: 500;
            border: none;
            transition: background 0.3s ease;
        }

        .btn-submit:hover {
            background-color: #2592ff;
        }

        .btn-reset {
            background-color: white;
            color: #6b7280;
            border: 1px solid #e5e7eb;
            transition: background 0.3s ease;
        }

        .btn-reset:hover {
            background-color: #f9fafb;
        }
    </style>
</head>

<body class="d-flex align-items-center min-vh-100 py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10 col-xl-9">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="row g-0">

                        <div class="col-md-5 side-banner d-none d-md-flex flex-column justify-content-center">
                        </div>

                        <div class="col-md-7 p-4 p-md-5 bg-white">

                            <div class="alert alert-success alert-dismissible fade show d-none" role="alert"
                                id="successAlert">
                                <strong>Berhasil!</strong> Data pendaftaran mahasiswa telah tersimpan.
                                <button type="button" class="btn-close" data-bs-dismiss="alert"
                                    aria-label="Close"></button>
                            </div>

                            <h4 class="fw-bold mb-1">Form Pendaftaran</h4>
                            <p class="text-muted small mb-4">Lengkapi data diri anda pada kolom pengisian.</p>

                            <form action="" class="needs-validation" novalidate tabindex="0">

                                <div class="row">
                                    <div class="col-sm-6 form-group">
                                        <label for="nama" class="form-label">Nama Lengkap <span
                                                class="asterisk">*</span></label>

                                        <input type="text" class="form-control" id="nama"
                                            placeholder="Contoh: Evan Fausta Pradana" required>
                                        <div class="valid-feedback">
                                            Sempurna! Format nama sudah cocok.
                                        </div>
                                    </div>
                                    <div class="col-sm-6 form-group">
                                        <label for="nim" class="form-label">Nomor Induk Mahasiswa <span
                                                class="asterisk">*</span></label>
                                        <input type="text" class="form-control" id="nim"
                                            placeholder="Contoh: 25/560829/SV/26841" required>
                                    </div>
                                </div>

                                <div class="form-group mb-3">
                                    <label for="email" class="form-label">Email Mahasiswa <span
                                            class="asterisk">*</span></label>

                                    <input type="email" class="form-control" id="email"
                                        placeholder="Contoh: evan@ugm.ac.id" required>
                                    <div class="invalid-feedback">
                                        Tolong gunakan format email yang benar (terdapat elemen @).
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-sm-6 form-group">
                                        <label for="prodi" class="form-label">Program Studi <span
                                                class="asterisk">*</span></label>
                                        <select name="prodi" id="prodi" class="form-select" required>
                                            <option value="" selected disabled>Pilih Prodi</option>
                                            <option value="TI">Teknik Informatika</option>
                                            <option value="SI">Sistem Informasi</option>
                                            <option value="TK">Teknik Komputer</option>
                                        </select>
                                    </div>
                                    <div class="col-sm-6 form-group">
                                        <label for="semester" class="form-label">Semester <span
                                                class="asterisk">*</span></label>
                                        <select name="semester" id="semester" class="form-select" required>
                                            <option value="" selected disabled>Pilih Semester</option>
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                            <option value="5">5</option>
                                            <option value="6">6</option>
                                            <option value="7">7</option>
                                            <option value="8">8</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="alamat" class="form-label">Alamat Domisili <span
                                            class="asterisk">*</span></label>
                                    <textarea name="alamat" id="alamat" class="form-control" rows="2"
                                        placeholder="Alamat lengkap..." required></textarea>
                                </div>

                                <div class="form-group mb-4">
                                    <label for="foto" class="form-label">Upload Foto Profil <span
                                            class="asterisk">*</span></label>
                                    <input type="file" class="form-control" id="foto" required>
                                </div>

                                <div class="mt-4 pt-1 d-flex gap-3">
                                    <button type="submit" class="btn btn-submit flex-grow-1 py-2">Kirim
                                        Pendaftaran</button>
                                    <button type="reset" class="btn btn-reset flex-grow-1 py-2">Reset Form</button>
                                </div>
                            </form>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const form = document.querySelector('.needs-validation');

        form.addEventListener('reset', function () {
            const validationElements = this.querySelectorAll('.is-valid, .is-invalid');
            validationElements.forEach(el => {
                el.classList.remove('is-valid', 'is-invalid');
            });
        });


        const inputs = form.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
            const validateInput = () => {
                if (input.value.trim() !== '' || input.classList.contains('is-invalid')) {
                    if (input.checkValidity()) {
                        input.classList.remove('is-invalid');
                        input.classList.add('is-valid');
                    } else {
                        input.classList.remove('is-valid');
                        input.classList.add('is-invalid');
                    }
                }
            };

            input.addEventListener('input', validateInput);
            input.addEventListener('blur', validateInput);
        });

        form.addEventListener('submit', function (event) {
            if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
            }

            inputs.forEach(input => {
                if (input.checkValidity()) {
                    input.classList.remove('is-invalid');
                    input.classList.add('is-valid');
                } else {
                    input.classList.remove('is-valid');
                    input.classList.add('is-invalid');
                }
            });
        }, false);
    </script>
</body>

</html>
