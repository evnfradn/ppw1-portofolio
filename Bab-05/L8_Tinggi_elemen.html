<!DOCTYPE html>
<html>
<head>
    <title>Contoh CSS</title>
    <style>
        .p {
            border: 1px solid rgb(154, 19, 196);
            padding: 5px;
        }

        .high {
            height: 300px;
        }

        .low {
            height: 50px;
        }
    </style>
</head>
<body>
    <p class="p">Aku adalah tag p tanpa lebar </p>
    <p class="p high">Aku adalah tag p high </p>
    <p class="p low">Aku adalah tag p low </p>
</body>
</html>
