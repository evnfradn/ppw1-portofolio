<!DOCTYPE html>
<html>

<body>

    <h3>1. Silahkan pelajari dan buatkan contoh untuk html tag ini: &lt;fieldset&gt;, &lt;legend&gt;, &lt;datalist&gt;,
        &lt;output&gt;, &lt;option&gt;, &lt;optgroup&gt;
    </h3>
    <hr>

    <form oninput="hasil_kecepatan.value=kecepatan.value">
        <fieldset>
            <legend>Data Kendaraan & Kecepatan</legend>

            <p>
                <label>1. Pilih Merek Kendaraan (Tag Datalist):</label><br>
                <input list="merek" name="merek_kendaraan">
                <datalist id="merek">
                    <option value="Toyota"></option>
                    <option value="Honda"></option>
                    <option value="Suzuki"></option>
                    <option value="Mitsubishi"></option>
                </datalist>
            </p>

            <p>
                <label>2. Kategori Kendaraan (Tag Select, Optgroup, dan Option):</label><br>
                <select name="kategori_kendaraan">
                    <option value="" disabled selected>-- Pilih Kategori --</option>
                    <optgroup label="Mobil Pribadi">
                        <option value="sedan">Sedan</option>
                        <option value="suv">SUV</option>
                    </optgroup>
                    <optgroup label="Mobil Komersial">
                        <option value="pickup">Pick Up</option>
                        <option value="truk">Truk Box</option>
                    </optgroup>
                </select>
            </p>

            <p>
                <label>3. Estimasi Kecepatan km/jam (Tag Output):</label><br>
                0 <input type="range" id="kecepatan" name="kecepatan" min="0" max="150" value="60"> 150
                <br>
                Output Kecepatan: <output name="hasil_kecepatan" for="kecepatan">60</output> km/jam
            </p>

        </fieldset>
    </form>

</body>

</html>
