<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Praktikum JavaScript - Evan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script>
        // Penulisan Embed di Head - Output Alert
        alert("Selamat datang di page Evan lol");
    </script>
</head>
<body class="p-5 bg-light">

    <div class="container bg-white p-4 shadow rounded">
        <h2 class="mb-4 text-primary">Tugas 1: Penulisan & Output</h2>
        
        <button class="btn btn-info mb-3" onclick="alert('Output dari JavaScript Inline')">
            Klik Tombol
        </button>

        <div id="output-inner" class="alert alert-secondary">
            Teks default...
        </div>

        <hr class="my-5">

        <h2 class="mb-4 text-success">Tugas 2: Pendataan Praktikan</h2>
        <div id="tabel-container"></div>
    </div>

    <script>
        // Output innerHTML
        document.getElementById("output-inner").innerHTML = "Berhasil mengubah konten via <b>innerHTML</b>.";

        // Output document.write
        document.write("<p class='text-center text-muted'>Generated by document.write</p>");

        // Form Pendataan
        var konfirmasi = confirm("Apakah Anda mahasiswa praktikan pepewe?");

        if (konfirmasi) {
            var nama = prompt("Nama Lengkap:");
            var nim = prompt("NIM:");
            var angkatan = prompt("Tahun Angkatan:");

            // Hitung tahun lulus (Angkatan + 4)
            var tahunLulus = parseInt(angkatan) + 4;
            
            // Cek NIM ganjil atau genap
            var cekNim = (parseInt(nim) % 2 === 0) ? "Genap" : "Ganjil";

            // Render tabel ke container
            var container = document.getElementById("tabel-container");
            container.innerHTML = `
                <table class="table table-bordered mt-3">
                    <thead class="table-dark">
                        <tr>
                            <th>Nama</th>
                            <th>NIM</th>
                            <th>Angkatan</th>
                            <th>Estimasi Lulus</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>${nama}</td>
                            <td>${nim}</td>
                            <td>${angkatan}</td>
                            <td>${tahunLulus}</td>
                        </tr>
                    </tbody>
                </table>
                <p>Catatan: NIM Anda bernilai <strong>${cekNim}</strong>.</p>
            `;
        } else {
            // Pesan jika memilih Cancel
            document.getElementById("tabel-container").innerHTML = `
                <div class="alert alert-danger text-center">
                    <h4>Akses Ditolak</h4>
                    <p>Hanya untuk praktikan pepewe</p>
                </div>
            `;
        }
    </script>

    <script src="scriptexternal.js"></script>
</body>
</html>
