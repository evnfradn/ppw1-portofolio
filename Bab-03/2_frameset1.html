<!DOCTYPE html>
<html>
<head>
    <title>Frameset Horizontal dan Vertikal</title>
</head>
<frameset rows="25%,*,25%">
    <frame src="top.html" name="top">
    <frameset cols="20%,*,20%">
        <frame src="left.html" name="left">
        <frame src="center.html" name="center">
        <frame src="right.html" name="right">
    </frameset>
    <frame src="bottom.html" name="bottom">
</frameset>
</html>
