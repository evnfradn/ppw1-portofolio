<!DOCTYPE html>
<html>

<body>
    <h2>Radio buttons evan ganteng</h2>
    <form>
        <p>Pilih tingkat kegantengan evan:</p>
        <input type="radio" id="ganteng" name="tingkat" value="ganteng">
        <label for="ganteng">Ganteng banget</label><br>
        <input type="radio" id="biasa" name="tingkat" value="biasa">
        <label for="biasa">Biasa aja bohong deng</label>
    </form>
</body>

</html>
