<!DOCTYPE html>
<html>

<body>
    <h2>Atribut formenctype evan ganteng</h2>
    <form action="/upload" method="post">
        <label for="file">Upload foto evan ganteng:</label><br>
        <input type="file" id="file" name="file"><br><br>
        <button type="submit" formenctype="multipart/form-data">Upload sebagai multipart</button>
    </form>
</body>

</html>
